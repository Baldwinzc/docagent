<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>docagent — ask your documents</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    .typing span { animation: blink 1.4s infinite both; }
    .typing span:nth-child(2){ animation-delay:.2s } .typing span:nth-child(3){ animation-delay:.4s }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
    .prose-doc p{margin:.4rem 0} .prose-doc code{background:#f4f4f5;padding:.1rem .3rem;border-radius:.3rem;font-size:.85em}
    .prose-doc ul{margin:.4rem 0;padding-left:1.2rem;list-style:disc} .prose-doc pre{background:#18181b;color:#e4e4e7;padding:.7rem;border-radius:.6rem;overflow:auto;font-size:.8rem}
  </style>
</head>
<body class="h-full bg-zinc-50 text-zinc-900">
  <div class="mx-auto flex h-full max-w-3xl flex-col px-4">
    <header class="flex items-center justify-between border-b border-zinc-200 py-4">
      <div>
        <h1 class="text-lg font-semibold tracking-tight">docagent</h1>
        <p class="text-sm text-zinc-500">Agentic RAG over your local documents · answers with verified citations</p>
      </div>
      <div id="kb" class="rounded-full bg-zinc-100 px-3 py-1 text-xs text-zinc-600">loading KB…</div>
    </header>

    <main id="messages" class="flex-1 space-y-4 overflow-y-auto py-6">
      <div class="rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm">
        <p class="text-sm text-zinc-600">Ask a question about the knowledge base (FastAPI docs + Python typing/async PEPs). Try one:</p>
        <div id="examples" class="mt-3 flex flex-wrap gap-2"></div>
      </div>
    </main>

    <footer class="border-t border-zinc-200 py-4">
      <form id="form" class="flex items-end gap-2">
        <textarea id="q" rows="1" placeholder="Ask about FastAPI, typing, async…"
          class="max-h-40 flex-1 resize-none rounded-xl border border-zinc-300 bg-white px-4 py-3 text-sm shadow-sm focus:border-zinc-900 focus:outline-none focus:ring-1 focus:ring-zinc-900"></textarea>
        <button id="send" type="submit"
          class="rounded-xl bg-zinc-900 px-4 py-3 text-sm font-medium text-white transition hover:bg-zinc-700 disabled:opacity-40">Ask</button>
      </form>
      <p class="mt-2 text-center text-xs text-zinc-400">docagent · hybrid retrieval + cross-encoder rerank · verified citations</p>
    </footer>
  </div>

  <script>
    const EXAMPLES = [
      "How do I declare an integer path parameter?",
      "What is dependency injection used for in FastAPI?",
      "When should I use async def instead of def?",
      "What does PEP 484 add to Python?",
      "What is the capital of France?",
    ];
    const $messages = document.getElementById("messages");
    const $form = document.getElementById("form");
    const $q = document.getElementById("q");
    const $send = document.getElementById("send");

    fetch("/api/sources").then(r => r.json()).then(d => {
      document.getElementById("kb").textContent = (d.sources?.length ?? 0) + " documents";
    }).catch(() => { document.getElementById("kb").textContent = "KB unavailable"; });

    const $ex = document.getElementById("examples");
    EXAMPLES.forEach(text => {
      const b = document.createElement("button");
      b.className = "rounded-lg border border-zinc-200 bg-zinc-50 px-3 py-1.5 text-xs text-zinc-700 transition hover:border-zinc-400 hover:bg-white";
      b.textContent = text;
      b.onclick = () => { $q.value = text; ask(); };
      $ex.appendChild(b);
    });

    function el(html) { const t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstChild; }
    function scroll() { $messages.scrollTop = $messages.scrollHeight; }
    function escape(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
    function chip(c, cls){ return `<code class="rounded-md ${cls} px-2 py-1 text-xs">${escape(c)}</code>`; }

    function userBubble(text) {
      return el(`<div class="flex justify-end"><div class="max-w-[80%] rounded-2xl bg-zinc-900 px-4 py-2.5 text-sm text-white">${escape(text)}</div></div>`);
    }
    function loadingCard() {
      return el(`<div class="rounded-2xl border border-zinc-200 bg-white p-4 shadow-sm"><div class="typing flex gap-1 text-zinc-400"><span>●</span><span>●</span><span>●</span></div></div>`);
    }

    function card(data) {
      if (data.kind === "question") {
        return el(`<div class="rounded-2xl border border-amber-200 bg-amber-50 p-5 shadow-sm">
          <div class="mb-2"><span class="rounded-full bg-amber-100 px-2 py-0.5 text-xs font-medium text-amber-800">needs clarification</span></div>
          <div class="text-sm text-zinc-800">${escape(data.question || "")}</div></div>`);
      }
      const inScope = data.intent === "in_scope";
      const badge = inScope
        ? `<span class="rounded-full bg-emerald-50 px-2 py-0.5 text-xs font-medium text-emerald-700">in scope</span>`
        : `<span class="rounded-full bg-zinc-100 px-2 py-0.5 text-xs font-medium text-zinc-600">out of scope</span>`;

      // markdown -> highlight inline locators -> SANITIZE (defends against
      // HTML/script injection coming from document content via the answer).
      let html = marked.parse(data.answer || "");
      html = html.replace(/\[([^\]\s]+\.(?:md|rst|txt|pdf)[^\]]*)\]/g,
        '<code class="rounded bg-amber-50 px-1 text-amber-700">[$1]</code>');
      html = DOMPurify.sanitize(html);

      const cites = (data.citations || []).map(c => chip(c, "bg-zinc-100 text-zinc-700")).join(" ");
      const citeBlock = cites
        ? `<div class="mt-3 border-t border-zinc-100 pt-3"><div class="mb-1.5 text-xs font-medium text-zinc-400">Citations (verified)</div><div class="flex flex-wrap gap-1.5">${cites}</div></div>`
        : "";

      const unsup = (data.unsupported || []).map(c => chip(c, "bg-red-50 text-red-600 line-through")).join(" ");
      const unsupBlock = unsup
        ? `<div class="mt-3 border-t border-zinc-100 pt-3"><div class="mb-1.5 text-xs font-medium text-red-400">Dropped — not actually retrieved</div><div class="flex flex-wrap gap-1.5">${unsup}</div></div>`
        : "";

      const steps = (data.trace || []).filter(t => t.step === "search_docs");
      const traceBlock = steps.length
        ? `<details class="mt-3 border-t border-zinc-100 pt-3"><summary class="cursor-pointer text-xs font-medium text-zinc-400">Retrieval trace · ${steps.length} search${steps.length>1?"es":""}</summary>
           <ol class="mt-2 space-y-1 text-xs text-zinc-500">${steps.map((s,i)=>`<li>${i+1}. <span class="font-mono">${escape(s.query||"")}</span></li>`).join("")}</ol></details>`
        : "";

      return el(`<div class="rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm">
        <div class="mb-2 flex items-center gap-2">${badge}</div>
        <div class="prose-doc text-sm leading-relaxed text-zinc-800">${html}</div>
        ${citeBlock}${unsupBlock}${traceBlock}</div>`);
    }

    async function ask() {
      const question = $q.value.trim();
      if (!question) return;
      $q.value = "";
      $send.disabled = true;
      $messages.appendChild(userBubble(question));
      const loading = loadingCard();
      $messages.appendChild(loading);
      scroll();
      try {
        const r = await fetch("/api/ask", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        const data = await r.json();
        loading.replaceWith(card(data));
      } catch (e) {
        loading.replaceWith(el(`<div class="rounded-2xl border border-red-200 bg-red-50 p-4 text-sm text-red-700">Request failed: ${escape(String(e))}</div>`));
      } finally {
        $send.disabled = false;
        scroll();
      }
    }

    $form.addEventListener("submit", e => { e.preventDefault(); ask(); });
    $q.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); ask(); } });

    // ?demo — render one real sample exchange (offline preview / screenshots)
    if (new URLSearchParams(location.search).has("demo")) {
      const DEMO = {
        kind: "answer", intent: "in_scope",
        answer: "Declare the path parameter with a standard Python type annotation, e.g. `item_id: int` in the path operation function. FastAPI then validates the incoming value and returns a `422` validation error if the client sends something that is not an integer [tutorial-path-params.md:L65-91].",
        citations: ["tutorial-path-params.md:L65-91", "tutorial-path-params.md:L89-107"],
        unsupported: [],
        trace: [{ step: "search_docs", query: "FastAPI path parameter integer non-integer validation" }],
      };
      $messages.appendChild(userBubble("How do I declare a path parameter that must be an integer, and what happens if the client sends a non-integer?"));
      $messages.appendChild(card(DEMO));
      scroll();
    }
  </script>
</body>
</html>
