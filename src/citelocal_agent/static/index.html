<!doctype html>
<html lang="zh" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>citelocal-agent — 向你的文档提问</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    .typing span { animation: blink 1.4s infinite both; }
    .typing span:nth-child(2){ animation-delay:.2s } .typing span:nth-child(3){ animation-delay:.4s }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
    .prose-doc p{margin:.4rem 0} .prose-doc code{background:#f4f4f5;padding:.1rem .3rem;border-radius:.3rem;font-size:.85em}
    .prose-doc ul{margin:.4rem 0;padding-left:1.2rem;list-style:disc} .prose-doc pre{background:#18181b;color:#e4e4e7;padding:.7rem;border-radius:.6rem;overflow:auto;font-size:.8rem}
  </style>
</head>
<body class="h-full bg-zinc-50 text-zinc-900">
  <div class="mx-auto flex h-full max-w-3xl flex-col px-4">
    <header class="flex items-center justify-between border-b border-zinc-200 py-4">
      <div>
        <h1 class="text-lg font-semibold tracking-tight">citelocal-agent</h1>
        <p class="text-sm text-zinc-500">与你的论文 / 文档对话 · 精确到页 / 行的可核验引用 · 全本地</p>
      </div>
      <div id="kb" class="rounded-full bg-zinc-100 px-3 py-1 text-xs text-zinc-600">正在加载知识库…</div>
    </header>

    <main id="messages" class="flex-1 space-y-4 overflow-y-auto py-6">
      <div class="rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm">
        <p class="text-sm text-zinc-600">就你的论文 / 文档提问。试试这些:</p>
        <div id="examples" class="mt-3 flex flex-wrap gap-2"></div>
      </div>
    </main>

    <footer class="border-t border-zinc-200 py-4">
      <form id="form" class="flex items-end gap-2">
        <textarea id="q" rows="1" placeholder="就你的论文 / 文档提问…"
          class="max-h-40 flex-1 resize-none rounded-xl border border-zinc-300 bg-white px-4 py-3 text-sm shadow-sm focus:border-zinc-900 focus:outline-none focus:ring-1 focus:ring-zinc-900"></textarea>
        <button id="send" type="submit"
          class="rounded-xl bg-zinc-900 px-4 py-3 text-sm font-medium text-white transition hover:bg-zinc-700 disabled:opacity-40">提问</button>
      </form>
      <p class="mt-2 text-center text-xs text-zinc-400">citelocal-agent · 混合检索 + 交叉编码器重排 · 可核验引用</p>
    </footer>
  </div>

  <script>
    const EXAMPLES = [
      "什么是缩放点积注意力(scaled dot-product attention)?",
      "RAG 如何把检索器和生成器结合起来?",
      "BERT 与 Transformer 架构是什么关系?",
      "BERT 使用了哪些预训练目标?",
      "法国的首都是哪里?",
    ];
    const $messages = document.getElementById("messages");
    const $form = document.getElementById("form");
    const $q = document.getElementById("q");
    const $send = document.getElementById("send");

    // One conversation thread per page load, so follow-up questions resolve
    // against earlier turns (server keys multi-turn memory by session_id).
    const SESSION = (crypto.randomUUID && crypto.randomUUID()) ||
      String(Date.now()) + Math.random().toString(16).slice(2);

    fetch("/api/sources").then(r => r.json()).then(d => {
      document.getElementById("kb").textContent = (d.sources?.length ?? 0) + " 篇文档";
    }).catch(() => { document.getElementById("kb").textContent = "知识库不可用"; });

    const $ex = document.getElementById("examples");
    EXAMPLES.forEach(text => {
      const b = document.createElement("button");
      b.className = "rounded-lg border border-zinc-200 bg-zinc-50 px-3 py-1.5 text-xs text-zinc-700 transition hover:border-zinc-400 hover:bg-white";
      b.textContent = text;
      b.onclick = () => { $q.value = text; ask(); };
      $ex.appendChild(b);
    });

    function el(html) { const t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstChild; }
    function scroll() { $messages.scrollTop = $messages.scrollHeight; }
    function escape(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
    function chip(c, cls){ return `<code class="rounded-md ${cls} px-2 py-1 text-xs">${escape(c)}</code>`; }

    function userBubble(text) {
      return el(`<div class="flex justify-end"><div class="max-w-[80%] rounded-2xl bg-zinc-900 px-4 py-2.5 text-sm text-white">${escape(text)}</div></div>`);
    }
    function loadingCard() {
      return el(`<div class="rounded-2xl border border-zinc-200 bg-white p-4 shadow-sm"><div class="typing flex gap-1 text-zinc-400"><span>●</span><span>●</span><span>●</span></div></div>`);
    }

    function card(data) {
      if (data.kind === "question") {
        return el(`<div class="rounded-2xl border border-amber-200 bg-amber-50 p-5 shadow-sm">
          <div class="mb-2"><span class="rounded-full bg-amber-100 px-2 py-0.5 text-xs font-medium text-amber-800">需要澄清</span></div>
          <div class="text-sm text-zinc-800">${escape(data.question || "")}</div></div>`);
      }
      const inScope = data.intent === "in_scope";
      const badge = inScope
        ? `<span class="rounded-full bg-emerald-50 px-2 py-0.5 text-xs font-medium text-emerald-700">在范围内</span>`
        : `<span class="rounded-full bg-zinc-100 px-2 py-0.5 text-xs font-medium text-zinc-600">超出范围</span>`;

      // markdown -> highlight inline locators -> SANITIZE (defends against
      // HTML/script injection coming from document content via the answer).
      let html = marked.parse(data.answer || "");
      html = html.replace(/\[([^\]\s]+\.(?:md|rst|txt|pdf)[^\]]*)\]/g,
        '<code class="rounded bg-amber-50 px-1 text-amber-700">[$1]</code>');
      html = DOMPurify.sanitize(html);

      const cites = (data.citations || []).map(c => chip(c, "bg-zinc-100 text-zinc-700")).join(" ");
      const citeBlock = cites
        ? `<div class="mt-3 border-t border-zinc-100 pt-3"><div class="mb-1.5 text-xs font-medium text-zinc-400">引用(已核验)</div><div class="flex flex-wrap gap-1.5">${cites}</div></div>`
        : "";

      const unsup = (data.unsupported || []).map(c => chip(c, "bg-red-50 text-red-600 line-through")).join(" ");
      const unsupBlock = unsup
        ? `<div class="mt-3 border-t border-zinc-100 pt-3"><div class="mb-1.5 text-xs font-medium text-red-400">已丢弃 —— 实际未检索到</div><div class="flex flex-wrap gap-1.5">${unsup}</div></div>`
        : "";

      const steps = (data.trace || []).filter(t => t.step === "search_docs");
      const traceBlock = steps.length
        ? `<details class="mt-3 border-t border-zinc-100 pt-3"><summary class="cursor-pointer text-xs font-medium text-zinc-400">检索轨迹 · ${steps.length} 次检索</summary>
           <ol class="mt-2 space-y-1 text-xs text-zinc-500">${steps.map((s,i)=>`<li>${i+1}. <span class="font-mono">${escape(s.query||"")}</span></li>`).join("")}</ol></details>`
        : "";

      return el(`<div class="rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm">
        <div class="mb-2 flex items-center gap-2">${badge}</div>
        <div class="prose-doc text-sm leading-relaxed text-zinc-800">${html}</div>
        ${citeBlock}${unsupBlock}${traceBlock}</div>`);
    }

    async function ask() {
      const question = $q.value.trim();
      if (!question) return;
      $q.value = "";
      $send.disabled = true;
      $messages.appendChild(userBubble(question));
      const loading = loadingCard();
      $messages.appendChild(loading);
      scroll();
      try {
        const r = await fetch("/api/ask", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, session_id: SESSION }),
        });
        const data = await r.json();
        loading.replaceWith(card(data));
      } catch (e) {
        loading.replaceWith(el(`<div class="rounded-2xl border border-red-200 bg-red-50 p-4 text-sm text-red-700">请求失败: ${escape(String(e))}</div>`));
      } finally {
        $send.disabled = false;
        scroll();
      }
    }

    $form.addEventListener("submit", e => { e.preventDefault(); ask(); });
    $q.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); ask(); } });

    // ?demo — 渲染一段真实的多轮对话(离线预览 / 截图用)。第二轮的「它」只有
    // 在记住第一轮上下文时才能理解 —— 用来展示多轮对话记忆。
    if (new URLSearchParams(location.search).has("demo")) {
      $messages.innerHTML = "";  // 干净的对话视图,便于截图
      const TURNS = [
        {
          q: "什么是缩放点积注意力(scaled dot-product attention)?",
          a: {
            kind: "answer", intent: "in_scope",
            answer: "它按 softmax(QKᵀ/√d_k)·V 计算:先对查询 Q 与键 K 做点积,除以 √d_k 缩放,经 softmax 得到权重,再对值 V 加权求和 [transformers-and-attention.md:L9-16]。",
            citations: ["transformers-and-attention.md:L9-16"], unsupported: [],
            trace: [{ step: "search_docs", query: "缩放点积注意力 公式 softmax QK 值" }],
          },
        },
        {
          q: "它为什么要除以 √d_k?",
          a: {
            kind: "answer", intent: "in_scope",
            answer: "因为当维度 d_k 较大时,点积的量级会随之变大,把 softmax 推入梯度极小的区域;除以 √d_k 抵消这种增长,让训练更稳定 [transformers-and-attention.md:L9-16]。",
            citations: ["transformers-and-attention.md:L9-16"], unsupported: [],
            trace: [{ step: "search_docs", query: "缩放 1/sqrt(d_k) 点积 梯度 softmax 稳定" }],
          },
        },
      ];
      for (const t of TURNS) {
        $messages.appendChild(userBubble(t.q));
        $messages.appendChild(card(t.a));
      }
      scroll();
    }
  </script>
</body>
</html>
