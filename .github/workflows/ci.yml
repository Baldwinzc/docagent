name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (CPU torch + project + dev)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests scripts

      - name: Type check (mypy)
        run: mypy

      - name: Unit + web tests (offline — no network, no model downloads, no API key)
        run: python -m pytest tests/test_unit.py tests/test_web.py -v

      - name: Retrieval integration tests (downloads embedding + reranker)
        run: python -m pytest tests/test_retrieval.py -v

      - name: Build wheel and verify static UI is packaged
        run: |
          pip install build
          python -m build --wheel
          python -c "import glob,zipfile; w=glob.glob('dist/*.whl')[0]; n=zipfile.ZipFile(w).namelist(); assert any(x.endswith('static/index.html') for x in n), 'static/index.html missing from wheel'; print('OK: static packaged in', w)"
